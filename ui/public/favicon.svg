<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0b1830"/>
      <stop offset="100%" stop-color="#050b14"/>
    </radialGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#36e0ff"/>
      <stop offset="55%" stop-color="#6f7bff"/>
      <stop offset="100%" stop-color="#b06bff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded-square tile -->
  <rect x="6" y="6" width="84" height="84" rx="22" fill="url(#bg)" stroke="url(#neon)" stroke-width="3"/>

  <!-- AI core ring -->
  <g filter="url(#glow)" fill="none" stroke="url(#neon)" stroke-linecap="round">
    <circle cx="48" cy="48" r="22" stroke-width="4"/>
    <circle cx="48" cy="48" r="11" stroke-width="6" opacity="0.9"/>
  </g>

  <!-- three orbiting nodes -->
  <g fill="url(#neon)">
    <circle cx="48" cy="18" r="4"/>
    <circle cx="76" cy="56" r="3.5"/>
    <circle cx="22" cy="60" r="3.5"/>
  </g>
</svg>
