# Render deploy config for the Nira AI backend (FastAPI).
# Dashboard alternative: New Web Service -> connect repo -> Runtime: Docker.
# This file lets you deploy with one click ("Deploy to Render").

services:
  - type: web
    name: nira-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Use the Dockerfile above (it fetches the Kokoro/Piper TTS weights via LFS).
    plan: free            # upgrade to a paid plan for always-on + snappier voice
    region: oregon        # pick the region nearest your users
    branch: main
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false        # Render will prompt you to enter the secret
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: JARVIS_KOKORO_VOICE
        value: bm_george
      - key: JARVIS_KOKORO_LANG
        value: en-gb
      - key: JARVIS_KOKORO_SPEED
        value: "1.0"
      # ---- OAuth integration storage ----
      # These are managed in the Render DASHBOARD (Environment) so secret values
      # are not committed to git. IMPORTANT: do NOT declare them here with
      # sync:false — on each deploy Render resets unset sync:false vars to empty,
      # which wiped MONGODB_URI and broke token storage. Set them once in the
      # dashboard and they persist across deploys.
      #   MONGODB_URI            (Atlas connection string -> nira_oauth db)
      #   TOKEN_ENCRYPTION_KEY   (Fernet key)
      #   WEB_ORIGIN             (https://nira-ai-assistant.vercel.app)
      #   GITHUB_CLIENT_ID / _SECRET
      #   SPOTIFY_CLIENT_ID / _SECRET
      #   GOOGLE_CLIENT_ID / _SECRET
      #   REDDIT_CLIENT_ID / _SECRET
      #   X_CLIENT_ID / _SECRET
      # PORT is auto-injected by Render; do not hardcode it.
