# Render deploy config for the Nira AI backend (FastAPI).
# Dashboard alternative: New Web Service -> connect repo -> Runtime: Docker.
# This file lets you deploy with one click ("Deploy to Render").

services:
  - type: web
    name: nira-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Use the Dockerfile above (it fetches the Kokoro/Piper TTS weights via LFS).
    plan: free            # upgrade to a paid plan for always-on + snappier voice
    region: oregon        # pick the region nearest your users
    branch: main
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false        # Render will prompt you to enter the secret
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: JARVIS_KOKORO_VOICE
        value: bm_george
      - key: JARVIS_KOKORO_LANG
        value: en-gb
      - key: JARVIS_KOKORO_SPEED
        value: "1.0"
      # ---- OAuth integration storage (REQUIRED for Tool Connections) ----
      - key: MONGODB_URI
        sync: false        # your MongoDB Atlas connection string (nira_oauth db)
      - key: TOKEN_ENCRYPTION_KEY
        sync: false        # Fernet key (python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
      - key: WEB_ORIGIN
        sync: false        # frontend origin, e.g. https://nira-ai-assistant.vercel.app (for CORS + cookie landing)
      # ---- OAuth provider client credentials ----
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      # PORT is auto-injected by Render; do not hardcode it.
